<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devrek Yağmur Ekibi</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#090909;
color:white;
}

header{
position:fixed;
width:100%;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,.65);
backdrop-filter:blur(8px);
z-index:1000;
}

.logo{
font-size:30px;
font-weight:700;
color:#D4AF37;
}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
transition:.3s;
}

nav a:hover{
color:#D4AF37;
}

.hero{
height:100vh;
background:
linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.75)),
url("https://images.unsplash.com/photo-1511578314322-379afb476865?auto=format&fit=crop&w=1800&q=80");
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:65px;
}

.hero span{
color:#D4AF37;
}

.hero p{
margin-top:20px;
font-size:22px;
max-width:750px;
line-height:35px;
}

.btns{
margin-top:40px;
}

.btn{
display:inline-block;
padding:15px 35px;
margin:10px;
border-radius:40px;
text-decoration:none;
font-weight:bold;
transition:.3s;
}

.gold{
background:#D4AF37;
color:black;
}

.white{
border:2px solid white;
color:white;
}

.btn:hover{
transform:scale(1.05);
}

@media(max-width:768px){

nav{
display:none;
}

.hero h1{
font-size:42px;
}

.hero p{
font-size:18px;
line-height:30px;
}

}
</style>

</head>

<body>

<header>

<div class="logo">
🎻 Devrek Yağmur Ekibi
</div>

<nav>

<a href="#">Ana Sayfa</a>
<a href="#">Hakkımızda</a>
<a href="#">Hizmetler</a>
<a href="#">Galeri</a>
<a href="#">İletişim</a>

</nav>

</header>

<section class="hero">

<div>

<h1>

<span>Devrek</span><br>

Yağmur Ekibi

</h1>

<p>

Hayallerinizi müziğimizle gerçeğe dönüştürüyoruz.

Düğün, nişan, kına, sünnet, asker eğlencesi ve tüm organizasyonlarda profesyonel müzik hizmeti.

</p>

<div class="btns">

<a class="btn gold" href="tel:05369686573">

📞 Hemen Ara

</a>

<a class="btn white" href="https://wa.me/905369686573">

💬 WhatsApp

</a>

</div>

</div>

</section>

</body>
</html>
