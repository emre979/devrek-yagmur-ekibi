*{

html{

nav a{

nav a:hover{

}

.hero{

height:100vh;

background:

linear-gradient(rgba(0,0,0,.60),rgba(0,0,0,.70)),

url("https://images.unsplash.com/photo-1511578314322-379afb476865?auto=format&fit=crop&w=1800&q=80");

background-position:center;

display:flex;
justify-content:center;

}

.hero h1{

font-size:65px;

}

}

.hero p{

max-width:800px;

line-height:35px;

}

.buttons{

margin-top:40px;

}

.btn{

display:inline-block;

padding:16px 38px;

border-radius:50px;

text-decoration:none;

font-weight:bold;

margin:10px;

transition:.35s;

}

.gold{

background:#D4AF37;

color:black;

}

.gold:hover{

transform:scale(1.07);

}

.white{

border:2px solid white;

color:white;

}

.white:hover{

background:white;
color:black;

}

.scroll{

position:absolute;

bottom:30px;

left:50%;

transform:translateX(-50%);

font-size:15px;

opacity:.8;

}

@media(max-width:768px){

.hero h1{

font-size:42px;

}

.hero p{

font-size:18px;

line-height:30px;

}

nav{
